<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Resultado do Quiz</title>
    <link rel="stylesheet" href="../styles/styleResultado.css" />
  </head>

  <body>
    <div class="container">
      <div class="resultado-card">
        <div class="icone">🏆</div>

        <h1>Quiz Finalizado!</h1>

        <p class="subtitulo">Veja como você se saiu:</p>

        <div class="pontuacao-area">
          <span id="pontuacaoNumero">0</span>
          <span class="total" id="pontosResultado">/ 100</span>
        </div>

        <div class="barra">
          <div class="progresso" id="barraProgresso"></div>
        </div>

        <p id="mensagemResultado" class="mensagem"></p>

        <a href="../telas/index.html" class="botao-voltar">
          Voltar para todas as categorias →
        </a>
      </div>
    </div>
    <script>
      let pontosR = localStorage.getItem("pontuacao") || 0;
      pontosR = parseInt(pontosR);

      let mensagem = "";

      if (pontosR == 100) {
        mensagem = "Excelente! Você acertou tudo! 🚀";
      } else if (pontosR >= 60) {
        mensagem = "Muito bem! Você teve um ótimo desempenho! 👏";
      } else if (pontosR >= 30) {
        mensagem = "Bom trabalho! Continue praticando. 👍";
      } else {
        mensagem = "Não desista! Tente novamente e melhore sua pontuação. 📚";
      }

      let porcentagem = pontosR;

      // Atualiza tela
      document.getElementById("pontuacaoNumero").innerText = pontosR;
      document.getElementById("barraProgresso").style.width = porcentagem + "%";
      document.getElementById("mensagemResultado").innerText = mensagem;
    </script>
  </body>
</html>
